project:
  name: exoplanet_tda_unified_smoke
  random_state: 42

paths:
  repo_root: "."
  data_dir: "data"
  outputs_dir: "outputs"
  reports_dir: "reports"
  run_dir_template: "outputs/runs/{run_id}"

run:
  run_id: null
  overwrite: false
  dry_run: true
  fail_fast: false
  use_gpu: auto

inputs:
  raw_catalog: "data/PSCompPars_2026.04.25_17.36.36.csv"
  imputed_catalog: "reports/imputation/PSCompPars_imputed_iterative.csv"
  mapper_outputs_dir: "outputs/mapper"
  system_candidates_csv: "outputs/system_missing_planets/candidate_missing_planets_by_system.csv"
  toi_regions_csv: "outputs/topological_incompleteness_index/tables/regional_toi_scores.csv"
  ati_anchors_csv: "outputs/topological_incompleteness_index/tables/anchor_ati_scores.csv"

stages:
  data_audit:
    enabled: true
  imputation:
    enabled: false
    mode: legacy_subprocess
    legacy_entrypoint: "src/impute_exodata.py"
    outputs_dir: "outputs/imputation"
  mapper:
    enabled: false
  observational_bias:
    enabled: false
  observational_shadow:
    enabled: false
  local_shadow_case_studies:
    enabled: false
  topological_incompleteness_index:
    enabled: false
  toi_ati_case_anatomy:
    enabled: false
  toi_ati_future_validation:
    enabled: false
  system_missing_planets:
    enabled: false
  candidate_characterization:
    enabled: false
  reporting:
    enabled: true
