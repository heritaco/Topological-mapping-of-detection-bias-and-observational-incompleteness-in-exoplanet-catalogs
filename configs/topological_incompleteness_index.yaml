project:
  name: topological_incompleteness_index
  random_state: 42

inputs:
  dataset: null
  membership: null
  edges: null
  node_shadow_metrics: outputs/observational_shadow/tables/node_observational_shadow_metrics.csv
  top_shadow_candidates: outputs/observational_shadow/tables/top_shadow_candidates.csv
  node_method_metrics: outputs/observational_bias_audit/tables/node_method_bias_metrics.csv
  node_method_fraction_matrix: outputs/observational_bias_audit/tables/node_method_fraction_matrix.csv

outputs:
  base_dir: outputs/topological_incompleteness_index
  tables_dir: outputs/topological_incompleteness_index/tables
  figures_dir: outputs/topological_incompleteness_index/figures_pdf
  metadata_dir: outputs/topological_incompleteness_index/metadata
  logs_dir: outputs/topological_incompleteness_index/logs
  latex_dir: latex/04_topological_incompleteness

analysis:
  config_id: orbital_pca2_cubes10_overlap0p35
  r3_variables:
    mass: pl_bmasse
    period: pl_orbper
    semimajor: pl_orbsmax
  discovery_method_column: discoverymethod
  planet_name_column: pl_name
  epsilon: 1.0e-9
  min_r3_valid_fraction_for_analogs: 0.60

toi:
  use_shadow_score: true
  use_r3_imputation: true
  use_physical_continuity: true
  use_network_support: true
  physical_sigma: 1.0
  min_node_members: 3
  high_priority_quantile: 0.90

ati:
  max_anchors_per_node: 1
  prefer_method: Radial Velocity
  prefer_low_imputation: true
  prefer_medoid: true

neighbor_deficit:
  radii:
    - r_node_median
    - r_node_q75
    - r_kNN
  knn_min: 3
  knn_max: 10
  analog_min_nodes: 3
  analog_shadow_quantile_max: 0.50
  analog_physical_distance_quantile: 0.35
  reference_min_planets: 3

report:
  make_latex: true
  make_figures: true
  make_summary: true
