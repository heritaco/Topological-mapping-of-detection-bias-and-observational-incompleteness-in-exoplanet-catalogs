  - nodefaults
dependencies:
  - python=3.12
  - pandas>=2.2
  - numpy>=1.26
  - plotly>=5.20
  - matplotlib>=3.8
  - scikit-learn>=1.4
  - scipy>=1.12
  - networkx>=3.2
  - joblib>=1.3
  - pyyaml>=6.0
  - nbformat>=5.10
  - nbconvert>=7.16
  - ipykernel>=6.29
  - jupyterlab>=4.0
  - pytest>=8.0
